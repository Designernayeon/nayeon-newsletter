name: Deploy Newsletter Site

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "out/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html style.css issues.json _site/
          touch _site/.nojekyll
          [ -d newsletters ] && cp -R newsletters _site/
          [ -d feeds ] && cp -R feeds _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
